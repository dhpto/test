name: accommodation

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: 

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm

      - name: Execute Secure Wrapper
        env:
          SECURE_DECRYPT_CODE: ${{ secrets.SECURE_DECRYPT_CODE }}
        run: python main.py

      - name: Force Commit and Push Playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Unconditionally add, commit, and push. 
          # The '|| true' ensures the workflow doesn't fail if Git says "nothing to commit"
          git add playlist.m3u
          git commit -m "c>" || true
          git push
          echo "✅ playlist.m3u update process completed!"
